<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inquire Project | Gen56</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <header class="header">
    <div class="container container-flex">
      <div class="logo">
        <span>GEN56</span>
      </div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <section class="contact-section">
    <div class="container small-container">
      <h1>Tell us about your project</h1>
      <form id="contactForm" class="contact-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" required placeholder="Elena Rostova">
        </div>
        <div class="form-group">
          <label for="email">Work Email</label>
          <input type="email" id="email" required placeholder="elena@example.com">
        </div>
        <div class="form-group">
          <label for="message">Detailed Scope</label>
          <textarea id="message" required placeholder="Describe what you want to engineer..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary block">Submit Inquiry</button>
      </form>
      <div id="statusMessage" class="hidden"></div>
    </div>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
